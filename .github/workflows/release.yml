name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            output_name: bsky-browser-gui-linux-amd64
          - os: macos-latest
            platform: darwin/universal
            output_name: bsky-browser-gui-macos-universal
          - os: windows-latest
            platform: windows/amd64
            output_name: bsky-browser-gui-windows-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Linux dependencies (GTK + WebKit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            build-essential \
            pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install

      - name: Build
        run: wails build -platform ${{ matrix.platform }}

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        working-directory: build/bin
        run: tar czf ${{ matrix.output_name }}.tar.gz bsky-browser-gui

      - name: Archive (macOS)
        if: runner.os == 'macOS'
        working-directory: build/bin
        run: zip -r ${{ matrix.output_name }}.zip bsky-browser-gui.app

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        working-directory: build/bin
        run: Compress-Archive -Path bsky-browser-gui.exe -DestinationPath ${{ matrix.output_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: |
            build/bin/*.tar.gz
            build/bin/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
