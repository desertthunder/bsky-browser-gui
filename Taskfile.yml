version: "3"

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev

tasks:
  dev:
    desc: Run the application in development mode with hot reload
    cmds:
      - wails dev -ldflags "-X main.version={{.VERSION}}"

  build:
    desc: Build the application for production
    cmds:
      - wails build -ldflags "-X main.version={{.VERSION}}"

  build:clean:
    desc: Clean and build the application for production
    cmds:
      - wails build -clean -ldflags "-X main.version={{.VERSION}}"

  generate:
    desc: Generate Wails bindings
    cmds:
      - wails generate module

  init:
    desc: Initialize the project (install dependencies)
    cmds:
      - cd frontend && pnpm install

  check:
    desc: Check TypeScript and Svelte
    cmds:
      - cd frontend && pnpm check

  lint:
    desc: Run Go and frontend linters
    cmds:
      - golangci-lint run
      - cd frontend && pnpm exec svelte-check --tsconfig ./tsconfig.json

  test:
    desc: Run the Go test suite
    cmds:
      - go test ./...
